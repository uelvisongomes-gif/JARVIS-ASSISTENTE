<!DOCTYPE html>
<html>
<head>
  <title>JARVIS ASSISTENTE</title>

  <style>
    body{
      width:300px;
      background:#0f172a;
      color:white;
      font-family:Arial;
      padding:20px;
    }

    h1{
      color:#22c55e;
      font-size:22px;
    }

    textarea{
      width:100%;
      height:120px;
      border:none;
      border-radius:10px;
      padding:10px;
      margin-top:10px;
      resize:none;
      background:#1e293b;
      color:white;
    }

    button{
      width:100%;
      margin-top:10px;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#22c55e;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    #response{
      margin-top:15px;
      background:#1e293b;
      padding:10px;
      border-radius:10px;
      min-height:80px;
    }
  </style>

</head>

<body>

  <h1>JARVIS</h1>

  <textarea id="prompt" placeholder="Digite sua pergunta..."></textarea>

  <button id="send">
    ANALISAR
  </button>

  <div id="response">
    Resposta aparecerá aqui...
  </div>

  <script src="popup.js"></script>

</body>
</html>
